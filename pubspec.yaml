name: smart_vault_app
description: SmartVaultz App
version: 1.0.0

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.2.1
  shared_preferences: ^2.2.3
  lottie: ^3.1.0
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/
    - assets/.env

# App icon from assets/Logo.jpeg (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/Logo.jpeg"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/Logo.jpeg"
  adaptive_icon_padding: 0
  adaptive_icon_foreground_inset: 0